name: Submit release to the WinGet community repository

on:
  release:
    types: [published]

jobs:
  publish-winget:
    name: Submit to WinGet repository
    runs-on: windows-latest
    
    permissions:
      contents: read
      pull-requests: write

    env:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}

    steps:
      - name: Submit package using wingetcreate
        shell: pwsh
        run: |
          # 1. Obtener info de la release
          \(assets = '\){{ toJSON(github.event.release.assets) }}' | ConvertFrom-Json
          \(packageVersion = "\){{ github.event.release.tag_name }}".TrimStart('v')
          
          # 2. Determinar el Package ID (Prerelease vs Stable)
          \(packageId = if ('\){{ github.event.release.prerelease }}' -eq 'true') { 'GitHub.Copilot.Prerelease' } else { 'GitHub.Copilot' }
          Write-Host "Procesando \(packageId versión \)packageVersion"

          # 3. Extraer URLs de los assets
          \(installerUrlx64 = \)assets | Where-Object -Property name -like '*win32-x64.zip' | Select-Object -ExpandProperty browser_download_url -First 1
          \(installerUrlarm64 = \)assets | Where-Object -Property name -like '*win32-arm64.zip' | Select-Object -ExpandProperty browser_download_url -First 1

          # 4. Validación: Verificar que al menos el asset x64 exista
          if (-not $installerUrlx64) {
              Write-Error "Error: No se encontró el asset para x64 (*win32-x64.zip)."
              exit 1
          }

          # 5. Instalar wingetcreate
          Write-Host "Descargando wingetcreate..."
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

          # 6. Preparar argumentos (Maneja si falta arm64)
          \(urlArgs = if (\)installerUrlarm64) {
              @("--urls", "\(installerUrlx64|x64", "\)installerUrlarm64|arm64")
          } else {
              @("--urls", "$installerUrlx64|x64")
          }

          # 7. Ejecutar y enviar
          Write-Host "Enviando actualización a WinGet..."
          .\wingetcreate.exe update $packageId `
            --version $packageVersion `
            @urlArgs `
            --submit

          if ($LASTEXITCODE -ne 0) {
              Write-Error "wingetcreate falló. Revisa que el Token tenga permisos suficientes."
              exit 1
          }
          
          Write-Host "¡PR enviado correctamente a WinGet!"
